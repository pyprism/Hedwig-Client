<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hedwig — shared mailbox client">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hedwig">
  <meta name="theme-color" content="#1565C0" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0D1117" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Hedwig</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1565C0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0D1117; }
      .loader-text { color: #90CAF9; }
    }

    #flutter-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      transition: opacity 0.3s ease;
    }

    #flutter-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .loader-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @media (prefers-color-scheme: dark) {
      .loader-spinner {
        border-color: rgba(144,202,249,0.3);
        border-top-color: #90CAF9;
      }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="flutter-loader">
    <div class="loader-icon">✉️</div>
    <div class="loader-spinner"></div>
    <span class="loader-text">Hedwig</span>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('flutter-loader');
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 300);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
