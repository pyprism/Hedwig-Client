name: Release

# Builds binaries for every platform and attaches them to the GitHub Release
# that triggered the run (publish a release to kick this off).
on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: android, os: ubuntu-latest }
          - { target: linux,   os: ubuntu-latest }
          - { target: web,     os: ubuntu-latest }
          - { target: windows, os: windows-latest }
          - { target: macos,   os: macos-latest }
          - { target: ios,     os: macos-latest }

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26 (Apple)
        if: matrix.target == 'macos' || matrix.target == 'ios'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Java (Android)
        if: matrix.target == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux build deps
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev

      - run: flutter pub get

      - name: Build & package
        shell: bash
        run: |
          mkdir -p dist
          case "${{ matrix.target }}" in
            android)
              flutter build apk --release
              cp build/app/outputs/flutter-apk/app-release.apk dist/hedwig-android.apk
              ;;
            linux)
              flutter build linux --release
              tar -czf dist/hedwig-linux-x64.tar.gz -C build/linux/x64/release/bundle .
              ;;
            web)
              flutter build web --release
              ( cd build/web && zip -r ../../dist/hedwig-web.zip . )
              ;;
            windows)
              flutter build windows --release
              powershell -Command "Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dist/hedwig-windows-x64.zip"
              ;;
            macos)
              flutter build macos --release
              APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
              ditto -c -k --keepParent "$APP" dist/hedwig-macos.zip
              ;;
            ios)
              flutter build ios --release --no-codesign
              mkdir -p Payload
              cp -r build/ios/iphoneos/Runner.app Payload/
              zip -r dist/hedwig-ios-unsigned.ipa Payload
              ;;
          esac

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*
