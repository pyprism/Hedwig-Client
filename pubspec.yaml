name: hedwig_client
description: Hedwig — a Gmail-like client for the Hedwig shared-mailbox platform.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.8.1

  # HTTP
  dio: ^5.8.0+1

  # Models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.5

  # Local DB / offline cache (drift)
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26

  # Connectivity
  connectivity_plus: ^6.1.4

  # Icons
  cupertino_icons: ^1.0.8

  # HTML rendering for email bodies
  flutter_widget_from_html_core: ^0.15.1

  # Open attachment URLs
  url_launcher: ^6.3.1

  # Localised date/time formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

  # Code generation
  riverpod_generator: ^2.4.5
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.5
  drift_dev: ^2.23.1

  # Icon + splash generation (run once: dart run flutter_launcher_icons && dart run flutter_native_splash:create)
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

# ─── flutter_launcher_icons ────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/icons/app_icon.png
    background_color: "#1565C0"
    theme_color: "#1565C0"
  macos:
    generate: true
    image_path: assets/icons/app_icon.png
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
    icon_size: 256
  image_path: assets/icons/app_icon.png
  remove_alpha_ios: true

# ─── flutter_native_splash ─────────────────────────────────────────────────────
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  image: assets/icons/app_icon.png
  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
    image: assets/icons/app_icon.png
  web: false
